<title>INTOLEARNING - Computer Science Resources</title>
<style>
  :root {
    /* Premium Plum/Purple Theme */
    --text-color: #f8fafc;
    --grid-line: rgba(255, 255, 255, 0.05);
    --spotlight: rgba(255, 255, 255, 0.15);
    --btn-bg: rgba(17, 10, 31, 0.4);
    --radius: 20px;
    --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
    --accent-color: #c084fc; 
    --bg-color: #170f23; 
  }

  /* Light Mode Override */
  [data-theme="light"] {
    --bg-color: #faf5ff; 
    --text-color: #0f172a;
    --grid-line: rgba(15, 23, 42, 0.08);
    --spotlight: rgba(15, 23, 42, 0.1);
    --btn-bg: rgba(255, 255, 255, 0.8);
  }

  html, body { 
    margin: 0; padding: 0; width: 100%; min-height: 100vh; 
    overscroll-behavior-x: none;
  }
  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; box-sizing: border-box; font-family: 'Helvetica', sans-serif; }

  body {
    background-color: var(--bg-color); color: var(--text-color);
    transition: background-color 1.5s ease;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden;
  }

  .grid-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; pointer-events: none;
    background-image: linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .grid-bg::after {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: linear-gradient(to right, var(--spotlight) 1.2px, transparent 1.2px),
                      linear-gradient(to bottom, var(--spotlight) 1.2px, transparent 1.2px);
    background-size: 50px 50px;
    -webkit-mask-image: radial-gradient(circle 200px at var(--m-x, 50%) var(--m-y, 50%), black, transparent);
    mask-image: radial-gradient(circle 200px at var(--m-x, 50%) var(--m-y, 50%), black, transparent);
  }

  #intro-wrapper {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 2000; background: transparent; 
    transition: opacity 1s var(--ease-smooth);
    pointer-events: none;
  }
  #intro-content { text-align: center; width: 90%; max-width: 850px; }
  #intro-text { font-size: clamp(2rem, 8vw, 2.5rem); font-weight: 900; color: var(--text-color); letter-spacing: 4px; margin-bottom: 30px; height: 1.2em; }
  #intro-sub { font-size: clamp(0.85rem, 3.5vw, 1.05rem); font-weight: 400; color: var(--accent-color); line-height: 1.8; letter-spacing: 0.5px; min-height: 4em; }

  .char { opacity: 0; transition: opacity 1.2s var(--ease-smooth); display: inline; }
  .char.visible { opacity: 1; }
  .accent-char { color: var(--accent-color); }

  .top-bar { 
    width: 100%; max-width: 1400px; display: flex; justify-content: space-between; 
    align-items: center; padding: 20px 40px; z-index: 1000; opacity: 0;
    transition: opacity 1.5s ease; position: relative;
  }
  .logo { text-decoration: none; color: var(--text-color); font-size: 1.1rem; letter-spacing: 1px; font-weight: 400; cursor: pointer; }
  .logo span { font-weight: 900; color: var(--accent-color); }

  .toggle-container { width: 44px; height: 22px; background: var(--btn-bg); border: 1.5px solid var(--accent-color); border-radius: 50px; cursor: pointer; position: relative; display: flex; align-items: center; padding: 0 3px; }
  .toggle-knob { width: 14px; height: 14px; background: var(--accent-color); border-radius: 50%; transition: transform 0.6s var(--ease-smooth); position: absolute; left: 3px; }
  [data-theme="light"] .toggle-knob { transform: translateX(22px); }

  .view-viewport { width: 100%; max-width: 1400px; position: relative; z-index: 10; flex-grow: 1; display: flex; flex-direction: column; }
  
  .carousel-track { 
    width: 100%; display: flex; flex-direction: column; flex-grow: 1; opacity: 0;
    transition: opacity 0.4s var(--ease-smooth); 
  }

  .page { 
    width: 100%; padding: 0 60px; display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; flex-grow: 1;
  }
  .page.active-page { display: flex; }

  .resource-container { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; flex-grow: 1; }
  
  /* Top-to-Bottom Cascade Animation Core Elements */
  .top-back-btn, .header-main, .home-search, .header-sub, h2#sem-title, h2#res-title, .semester-grid, #recent-files-container, .subject-grid, .resource-grid, .site-footer {
      opacity: 0; 
  }

  @keyframes cascadeDown {
    0% { opacity: 0; transform: translateY(-25px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Unified Timing for all elements to fade in simultaneously */
  .page.active-page .top-back-btn,
  .page.active-page .header-main,
  .page.active-page h2,
  .page.active-page .home-search,
  .page.active-page .header-sub,
  .page.active-page .semester-grid, 
  .page.active-page #recent-files-container,
  .page.active-page .subject-grid, 
  .page.active-page .resource-grid,
  .page.active-page .site-footer { 
      animation: cascadeDown 0.7s var(--ease-smooth) forwards 0.1s; 
  }

  .page-header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 800px; }
  .header-main { font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 900; letter-spacing: 3px; margin-bottom: 5px; }
  .header-sub { font-size: clamp(0.85rem, 3vw, 1rem); font-weight: 400; color: var(--accent-color); line-height: 1.6; padding: 0 20px; }

  /* Minimal Homepage Search Bar */
  .home-search { width: 100%; max-width: 540px; margin: 20px auto 25px auto; position: relative; z-index: 1001; }
  
  .search-bar { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1.5px solid rgba(192, 132, 252, 0.4); color: var(--accent-color); padding: 12px 25px; border-radius: 50px; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px; transition: all 0.4s var(--ease-smooth); font-family: inherit; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .search-bar::placeholder { color: rgba(192, 132, 252, 0.4); font-weight: 400; }
  .search-bar:hover { border-color: rgba(192, 132, 252, 0.8); box-shadow: 0 0 12px rgba(192, 132, 252, 0.2); }
  .search-bar:focus { outline: none; border-color: var(--accent-color); background: rgba(17, 10, 31, 0.6); box-shadow: 0 0 15px rgba(192, 132, 252, 0.3); }
  
  [data-theme="light"] .search-bar { background: rgba(255, 255, 255, 0.6); border-color: rgba(192, 132, 252, 0.6); color: var(--accent-color); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
  [data-theme="light"] .search-bar::placeholder { color: rgba(192, 132, 252, 0.6); }
  [data-theme="light"] .search-bar:hover { background: rgba(255, 255, 255, 0.8); border-color: var(--accent-color); box-shadow: 0 0 15px rgba(192, 132, 252, 0.3); }
  [data-theme="light"] .search-bar:focus { background: rgba(255, 255, 255, 1); border-color: var(--accent-color); box-shadow: 0 0 15px rgba(192, 132, 252, 0.4); }

  .search-results { position: absolute; top: 115%; left: 0; width: 100%; background: var(--bg-color); border: 1px solid var(--grid-line); border-radius: 20px; max-height: 300px; overflow-y: auto; display: none; padding: 15px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1002; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: left; }
  [data-theme="light"] .search-results { box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-color: rgba(192, 132, 252, 0.3); }
  
  .search-results.active { display: block; animation: cascadeDown 0.4s var(--ease-smooth); }
  .result-item { padding: 12px 15px; cursor: pointer; border-radius: 12px; font-size: 0.9rem; color: var(--accent-color); display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; text-decoration: none; margin-bottom: 5px; }
  .result-item:hover { background: rgba(192, 132, 252, 0.1); }
  .result-type { color: var(--accent-color); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-left: 10px; background: rgba(192, 132, 252, 0.1); padding: 4px 8px; border-radius: 50px; }

  /* Recently Added UI specific styling */
  .recent-file-item { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--grid-line); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  [data-theme="light"] .recent-file-item { background: rgba(255, 255, 255, 0.6); border-color: rgba(192, 132, 252, 0.3); }
  .recent-file-item:hover { background: rgba(192, 132, 252, 0.15) !important; border-color: var(--accent-color) !important; }

  .semester-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; width: 100%; max-width: 540px; margin: 0 auto; padding: 20px 0; }
  
  .btn {
    background: var(--btn-bg); color: var(--text-color); border: 1.5px solid var(--accent-color);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.6s var(--ease-smooth); text-align: center; cursor: pointer;
  }

  .sem-card { padding: 22px 0; width: 220px; border-radius: 50px; font-weight: 700; font-size: 1rem; }

  .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 35px; padding: 20px; width: 100%; }
  .sub-card { padding: 30px 15px; border-radius: var(--radius); font-weight: 600; font-size: 0.85rem; min-height: 160px; width: 100%; }
  
  .icon { width: 38px; height: 38px; fill: none; stroke: var(--accent-color); stroke-width: 1.5; margin-bottom: 12px; transition: stroke 0.6s; }
  .sub-text { color: var(--accent-color); font-size: 0.7rem; margin-top: 10px; font-weight: 700; transition: color 0.6s; }

  .resource-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; width: 100%; padding: 20px; }
  .chip { padding: 15px 25px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; min-height: 45px; }
  .top-back-btn { padding: 12px 30px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; margin-bottom: 40px; position: relative; width: auto; }

  .site-footer { width: 100%; text-align: center; padding: 40px 20px; color: var(--text-color); opacity: 0.7; font-size: 0.85rem; letter-spacing: 1px; font-weight: 400; margin-top: auto; }
  .site-footer a { color: var(--accent-color); text-decoration: none; font-weight: 600; }
  .site-footer a:hover { text-decoration: underline; }

  .page-spacer { height: 120px; width: 100%; pointer-events: none; }

  @media (hover: hover) {
    .btn:hover { transform: translateY(-8px) scale(1.02) !important; background: var(--accent-color); color: var(--bg-color); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }
    .btn:hover .icon { stroke: var(--bg-color); }
    .btn:hover .sub-text { color: var(--bg-color) !important; }
  }

  .btn:active { transform: scale(0.95) !important; }

  @media (max-width: 1024px) { 
    .top-bar { padding: 15px 20px; }
    .page { padding: 0 20px; padding-top: 30px; text-align: center; } 
    .header-sub { text-align: center; }
    .semester-grid { flex-direction: column; align-items: center; gap: 20px; }
    .sem-card { width: 100%; max-width: 320px; } 
    .subject-grid { grid-template-columns: 1fr; gap: 20px; place-items: center; } 
    .sub-card { width: 100%; max-width: 320px; }
    .resource-grid { flex-direction: column; align-items: center; }
    .chip { width: 100%; max-width: 320px; text-align: center; }
    .top-back-btn { margin-bottom: 30px; font-size: 0.7rem; } 
  }
</style>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx4_E2f3SyDKk_2ckwgwEF2a5Cr9XBBcxQlqcyQbAemuh2n5z8SKFg9JZnb7csJl4wx/exec';
    let driveData = {};
    let navStack = [];
    let isFromSearch = false; 
    let easterEggActive = false; 
    let currentSemState = null;

    const subtitleText = "A structured collection of Computer Science study resources. Find semester-wise materials, subjects, and notes to support your learning journey.";
    const wTitle1 = "Welcome ", wTitle2 = "Learners!";
    const wSubText = "Or Choose your semester below to access the study resources.";

    const GLYPHS = {
      'tie': '<path d="M16 2L14.5 7 18 18 12 22 6 18 9.5 7 8 2z"/>',
      'gear': '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>',
      'lighting': '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>', 'pencil': '<path d="M18 2L22 6L9 19L3 21L5 15L18 2ZM15 5L19 9"/>', 
      'math_signs': '<path d="M4 12h6M7 9v6M14 12h6"/>', 'chip': '<rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 10h8v4H8zM15 2v2M9 2v2M15 20v2M9 20v2M20 15h2M20 9h2M2 15h2M2 9h2"/>',
      'human': '<circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>', 'heart': '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>',
      'beaker': '<path d="M10 2v8L4.5 18a2 2 0 0 0 2 3h11a2 2 0 0 0 2-3L14 10V2"/>', 'book': '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>',
      'coding': '<path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/>', 'default': '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>'
    };

    function getSubjectIcon(name) {
      const n = name.toLowerCase();
      if (n.includes('personality') || n.includes('soft skill')) return GLYPHS['tie']; if (n.includes('manufactur') || n.includes('workshop')) return GLYPHS['gear']; if (n.includes('electrical')) return GLYPHS['lighting']; if (n.includes('graphic') || n.includes('design') || n.includes('drawing')) return GLYPHS['pencil']; if (n.includes('math')) return GLYPHS['math_signs']; if (n.includes('semiconductor') || n.includes('physics')) return GLYPHS['chip']; if (n.includes('human') || n.includes('value')) return GLYPHS['human']; if (n.includes('bio')) return GLYPHS['heart']; if (n.includes('chem')) return GLYPHS['beaker']; if (n.includes('english') || n.includes('writing')) return GLYPHS['book']; if (n.includes('program') || n.includes('coding') || n.includes('problem solving')) return GLYPHS['coding']; return GLYPHS['default'];
    }

    function initTexts() {
      const titleContainer = document.getElementById('intro-text');
      const subContainer = document.getElementById('intro-sub');
      const wTitleContainer = document.getElementById('welcome-title');
      const wSubContainer = document.getElementById('welcome-sub');
      
      let titleHTML = "";
      "INTO".split('').forEach(c => titleHTML += `<span class="char title-char accent-char">${c}</span>`);
      "LEARNING".split('').forEach(c => titleHTML += `<span class="char title-char">${c}</span>`);
      titleContainer.innerHTML = titleHTML;

      subContainer.innerHTML = subtitleText.split('').map(char => `<span class="char sub-char">${char}</span>`).join('');

      let wHTML = "";
      wTitle1.split('').forEach(c => wHTML += `<span class="char welcome-char accent-char">${c}</span>`);
      wTitle2.split('').forEach(c => wHTML += `<span class="char welcome-char">${c}</span>`);
      wTitleContainer.innerHTML = wHTML;
      wSubContainer.innerText = wSubText;
    }

    // Rare, random Easter Egg Logic (1 to 5 minutes)
    function startRandomFlyingText() {
      if (easterEggActive) return;
      easterEggActive = true;
      scheduleNextPhadle();
    }

    function scheduleNextPhadle() {
      // Spawns randomly between 60 seconds to 5 minutes (rare event)
      const delay = Math.random() * 240000 + 60000; 
      setTimeout(() => {
        spawnPhadleText();
        scheduleNextPhadle(); 
      }, delay);
    }

    function spawnPhadleText() {
      const text = document.createElement('div');
      const messages = [" PHADLE LAAAAAAAADLEEEEEEEE ", " meeeoooooooooooowwwwwwwwwwwwwww "];
      text.innerText = messages[Math.floor(Math.random() * messages.length)];
      
      text.style.position = 'fixed';
      text.style.color = 'var(--accent-color)';
      text.style.fontSize = '0.85rem';
      text.style.fontWeight = '600';
      text.style.letterSpacing = '1px';
      text.style.whiteSpace = 'nowrap';
      text.style.pointerEvents = 'none';
      text.style.zIndex = '999999'; 
      text.style.opacity = '1'; 
      
      const startLeft = Math.random() > 0.5;
      const startY = Math.random() * (window.innerHeight - 100) + 50;
      const endY = Math.random() * (window.innerHeight - 100) + 50;
      
      if (startLeft) { text.style.left = '-400px'; } 
      else { text.style.left = (window.innerWidth + 50) + 'px'; }
      text.style.top = startY + 'px';
      
      document.body.appendChild(text);
      
      setTimeout(() => {
          text.style.transition = 'left 6s linear, top 6s linear';
          if (startLeft) { text.style.left = (window.innerWidth + 50) + 'px'; } 
          else { text.style.left = '-400px'; }
          text.style.top = endY + 'px';
      }, 50);
      
      setTimeout(() => text.remove(), 6500);
    }

    function playIntroSequence() {
      const titleChars = document.querySelectorAll('.title-char');
      const subChars = document.querySelectorAll('.sub-char');
      
      titleChars.forEach((char, i) => setTimeout(() => char.classList.add('visible'), i * 30));
      const subDelay = (titleChars.length * 30) + 200;
      setTimeout(() => { 
          subChars.forEach((char, i) => setTimeout(() => char.classList.add('visible'), i * 15)); 
      }, subDelay);
    }

    function playWelcomeSequence() {
      const wChars = document.querySelectorAll('.welcome-char');
      const wsChars = document.querySelectorAll('.welcome-sub-char');
      wChars.forEach((char, i) => setTimeout(() => char.classList.add('visible'), i * 20));
      const subStartDelay = (wChars.length * 20) + 150;
      
      setTimeout(() => { 
          document.getElementById('sem-grid').classList.add('visible'); 
          const searchBar = document.querySelector('.home-search');
          if(searchBar) searchBar.classList.add('visible');
          
          startRandomFlyingText(); 
      }, subStartDelay + (wsChars.length * 10) + 200);
    }

    function skipWelcomeSequence() {
      document.querySelectorAll('.char').forEach(char => {
          char.style.transition = 'none';
          char.classList.add('visible');
      });
      const grid = document.getElementById('sem-grid');
      if (grid) {
          grid.style.transition = 'none';
          grid.classList.add('visible');
      }
      const searchBar = document.querySelector('.home-search');
      if (searchBar) {
          searchBar.style.transition = 'none';
          searchBar.classList.add('visible');
      }
      
      startRandomFlyingText(); 
    }

    function fadeToPage(pageId, setupCallback) {
      const track = document.getElementById('track');
      track.style.opacity = '0';
      
      setTimeout(() => {
        if (setupCallback) setupCallback();
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page'); 
        
        window.scrollTo({ top: 0, behavior: 'instant' });
        track.style.opacity = '1';
      }, 400); 
    }

    function endIntroSequence() {
      const intro = document.getElementById('intro-wrapper');
      const topBar = document.getElementById('top-bar');
      const track = document.getElementById('track');
      intro.style.opacity = '0';
      
      setTimeout(() => {
        intro.style.display = 'none';
        topBar.style.opacity = '1';
        track.style.opacity = '1';
        
        document.getElementById('sem-page').classList.add('active-page');
        playWelcomeSequence();
      }, 500); 
    }

    function renderSemesters(data) {
        const sems = Object.keys(data).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
        document.getElementById('sem-grid').innerHTML = sems.map(sem => 
          `<div class="btn sem-card" onclick="openSem('${sem.replace(/'/g, "\\'")}')">${sem}</div>`
        ).join('');
    }

    function renderRecentFiles(data) {
        let allFiles = [];
        
        function traverse(node) {
            for (const key in node) {
                if (key === 'files') {
                    node[key].forEach(f => allFiles.push(f));
                } else if (typeof node[key] === 'object' && node[key] !== null) {
                    traverse(node[key]);
                }
            }
        }
        traverse(data);
        
        const recentContainer = document.getElementById('recent-files-container');
        const recentList = document.getElementById('recent-files-list');
        
        if (allFiles.length > 0) {
            const hasDates = allFiles.some(f => f.dateCreated || f.date || f.timestamp || f.lastUpdated);
            
            let recent;
            if (hasDates) {
                allFiles.sort((a, b) => {
                    const dateA = new Date(a.dateCreated || a.date || a.timestamp || a.lastUpdated || 0).getTime();
                    const dateB = new Date(b.dateCreated || b.date || b.timestamp || b.lastUpdated || 0).getTime();
                    return dateB - dateA; 
                });
                recent = allFiles.slice(0, 2);
            } else {
                recent = allFiles.slice(-2).reverse();
            }
            
            recentList.innerHTML = recent.map(f => {
                const match = f.url.match(/\/d\/(.+?)\/|\?id=(.+?)(&|$)/);
                const fileId = match ? (match[1] || match[2]) : null;
                const previewUrl = fileId ? `https://drive.google.com/file/d/${fileId}/preview` : f.url;
                const cleanName = f.name.replace(/\.[^/.]+$/, "");
                
                return `<a href="${previewUrl}" target="_blank" class="result-item recent-file-item">
                          <div><strong>${cleanName}</strong></div>
                          <span class="result-type" style="background: rgba(192, 132, 252, 0.15);">NEW</span>
                        </a>`;
            }).join('');
            recentContainer.style.display = 'flex';
        } else {
            recentContainer.style.display = 'none';
        }
    }

    // MULTI-PAGE HISTORY HELPERS
    function reconstructNavStack(sem, pathTitles) {
        let stack = [];
        let curr = driveData[sem];
        if (!curr) return stack;
        for (const t of pathTitles) {
            curr = curr[t];
            if (!curr) break;
            stack.push({ title: t, data: curr });
        }
        return stack;
    }

    function goHome(fromHistory = false) {
        isFromSearch = false;
        navStack = [];
        fadeToPage('sem-page');
        if (!fromHistory) {
            history.pushState({ page: 'sem-page' }, '', window.location.pathname);
        }
    }

    // HANDLE BROWSER BACK BUTTON
    window.addEventListener('popstate', (event) => {
        const state = event.state;
        if (!state) {
            goHome(true);
            return;
        }

        if (state.page === 'sem-page') {
            isFromSearch = false;
            navStack = [];
            fadeToPage('sem-page');
        } else if (state.page === 'sub-page') {
            isFromSearch = false;
            currentSemState = state.sem;
            fadeToPage('sub-page', () => {
                document.getElementById('sem-title').innerText = state.sem;
                const grid = document.getElementById('subject-grid');
                grid.innerHTML = Object.keys(driveData[state.sem]).map((subName) => {
                  return `
                    <div class="btn sub-card" onclick="openRes('${state.sem.replace(/'/g, "\\'")}', '${subName.replace(/'/g, "\\'")}')">
                      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${getSubjectIcon(subName)}</svg> 
                      <div>${subName}</div>
                      <div class="sub-text">resource</div>
                    </div>
                  `;
                }).join('');
            });
        } else if (state.page === 'res-page') {
            isFromSearch = state.isSearch || false;
            currentSemState = state.sem;
            navStack = reconstructNavStack(state.sem, state.path);
            fadeToPage('res-page', () => {
                renderResPage();
            });
        }
    });

    async function fetchData() {
      initTexts();
      
      // Register initial state for browser history
      if (!history.state) {
          history.replaceState({ page: 'sem-page' }, '', window.location.pathname);
      }

      const hasSeenIntro = localStorage.getItem('introPlayed');
      if (!hasSeenIntro) {
          playIntroSequence();
          localStorage.setItem('introPlayed', 'true');
      } else {
          document.getElementById('intro-wrapper').style.display = 'none';
      }
      
      const stored = localStorage.getItem('driveData');
      if (stored) {
          driveData = JSON.parse(stored);
          renderSemesters(driveData);
          renderRecentFiles(driveData);
          if (hasSeenIntro) {
              document.getElementById('top-bar').style.opacity = '1';
              document.getElementById('track').style.opacity = '1';
              document.getElementById('sem-page').classList.add('active-page');
              skipWelcomeSequence();
          }
      }
      
      try {
          const fetchPromise = fetch(API_URL).then(res => res.json());
          
          if (!hasSeenIntro) {
              const introTimer = new Promise(resolve => setTimeout(resolve, 3500));
              const [freshData] = await Promise.all([fetchPromise, introTimer]);
              driveData = freshData;
              localStorage.setItem('driveData', JSON.stringify(freshData));
              renderSemesters(freshData);
              renderRecentFiles(freshData);
              endIntroSequence(); 
          } else {
              const freshData = await fetchPromise;
              driveData = freshData;
              localStorage.setItem('driveData', JSON.stringify(freshData));
              renderSemesters(freshData);
              renderRecentFiles(freshData);
              skipWelcomeSequence();
          }
      } catch (e) {
          if (!stored) {
              document.getElementById('intro-text').innerText = "Connection Error.";
              if (!hasSeenIntro) setTimeout(endIntroSequence, 3500);
          }
      }
    }

    function openSem(sem) {
      isFromSearch = false;
      currentSemState = sem;
      fadeToPage('sub-page', () => {
          document.getElementById('sem-title').innerText = sem;
          const grid = document.getElementById('subject-grid');
          grid.innerHTML = Object.keys(driveData[sem]).map((subName) => {
            return `
              <div class="btn sub-card" onclick="openRes('${sem.replace(/'/g, "\\'")}', '${subName.replace(/'/g, "\\'")}')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${getSubjectIcon(subName)}</svg> 
                <div>${subName}</div>
                <div class="sub-text">resource</div>
              </div>
            `;
          }).join('');
      });
      history.pushState({ page: 'sub-page', sem: sem }, '', '#subjects');
    }

    function renderResPage() {
      const current = navStack[navStack.length - 1];
      document.getElementById('res-title').innerText = current.title;
      const backBtn = document.getElementById('res-back-btn');
      
      // Update UI back buttons to trigger native browser history back
      if (isFromSearch) {
         backBtn.innerText = '← BACK TO HOME';
         backBtn.onclick = () => { history.back(); };
      } 
      else if (navStack.length > 1) {
         const parentTitle = navStack[navStack.length - 2].title;
         backBtn.innerText = '← BACK TO ' + parentTitle.toUpperCase();
         backBtn.onclick = () => { history.back(); };
      } else {
         backBtn.innerText = '← BACK TO SUBJECTS';
         backBtn.onclick = () => { history.back(); };
      }
      
      let folderHTML = '';
      let fileHTML = '';
      const data = current.data;
      
      if (data && typeof data === 'object') {
         let filesArray = Array.isArray(data.files) ? data.files : [];
         for (const key in data) {
            if (key === 'files') continue;
            const item = data[key];
            if (item && item.url && item.name) {
               filesArray.push(item);
            } else if (typeof item === 'object') {
               folderHTML += `<div class="btn chip" onclick="openSubfolder('${key.replace(/'/g, "\\'")}')">${key}</div>`;
            }
         }
         filesArray.forEach(f => {
            const match = f.url.match(/\/d\/(.+?)\/|\?id=(.+?)(&|$)/);
            const fileId = match ? (match[1] || match[2]) : null;
            const previewUrl = fileId ? `https://drive.google.com/file/d/${fileId}/preview` : f.url;
            fileHTML += `<a href="${previewUrl}" target="_blank" class="btn chip">${f.name.replace(/\.[^/.]+$/, "")}</a>`;
         });
      }
      const finalHTML = (folderHTML || fileHTML) ? `<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%;">${folderHTML}${fileHTML}</div>` : `<div style="opacity: 0.6; font-size: 0.9rem; margin-top: 20px;">No resources found in this folder.</div>`;
      document.getElementById('res-grid').innerHTML = finalHTML;
    }

    function openRes(sem, subName) {
      isFromSearch = false;
      currentSemState = sem;
      fadeToPage('res-page', () => {
          const rawData = driveData[sem][subName];
          navStack = [{ title: subName, data: rawData }];
          renderResPage();
      });
      const pathTitles = navStack.map(item => item.title);
      history.pushState({ page: 'res-page', sem: sem, path: pathTitles, isSearch: false }, '', '#resources');
    }

    function openSubfolder(folderName) {
      isFromSearch = false; 
      fadeToPage('res-page', () => {
          const currentData = navStack[navStack.length - 1].data;
          navStack.push({ title: folderName, data: currentData[folderName] });
          renderResPage();
      });
      const pathTitles = navStack.map(item => item.title);
      history.pushState({ page: 'res-page', sem: currentSemState, path: pathTitles, isSearch: false }, '', '#folder');
    }

    function jumpToResource(sem, sub, pathStr) {
      document.getElementById('search-results').classList.remove('active');
      document.getElementById('universal-search').value = '';
      
      if (!sem) return;
      if (!sub) { openSem(sem); return; }
      
      currentSemState = sem;
      const rawData = driveData[sem][sub];
      navStack = [{ title: sub, data: rawData }];
      
      if (pathStr) {
          const pathArray = pathStr.split('|');
          let currentData = rawData;
          pathArray.forEach(folder => {
              if (currentData && currentData[folder]) {
                  currentData = currentData[folder];
                  navStack.push({ title: folder, data: currentData });
              }
          });
      }
      
      isFromSearch = true; 
      fadeToPage('res-page', () => { renderResPage(); });
      const pathTitles = navStack.map(item => item.title);
      history.pushState({ page: 'res-page', sem: sem, path: pathTitles, isSearch: true }, '', '#search-result');
    }

    function findInDrive(data, query, currentSem = null, currentSub = null, currentPath = '', results = []) {
      const q = query.toLowerCase();
      for (const key in data) {
        if (q === '') return results;
        if (results.length > 15) return results; 
        
        if (currentSem === null) {
          if (key.toLowerCase().includes(q)) results.push({ type: 'semester', name: key, action: `jumpToResource('${key.replace(/'/g, "\\'")}', null, null)` });
          findInDrive(data[key], query, key, currentSub, currentPath, results);
        } else if (currentSub === null) {
          if (key.toLowerCase().includes(q)) results.push({ type: 'subject', name: key, context: currentSem, action: `jumpToResource('${currentSem.replace(/'/g, "\\'")}', '${key.replace(/'/g, "\\'")}', null)` });
          findInDrive(data[key], query, currentSem, key, currentPath, results);
        } else {
          if (key === 'files') {
            data[key].forEach(file => { 
                const cleanName = file.name.replace(/\.[^/.]+$/, ""); 
                if (cleanName.toLowerCase().includes(q) || file.name.toLowerCase().includes(q)) {
                    results.push({ type: 'file', name: cleanName, context: `${currentSub}`, url: file.url }); 
                }
            });
          } else if (key.toLowerCase().includes(q)) {
            const nextPath = currentPath ? `${currentPath}|${key}` : key;
            results.push({ type: 'folder', name: key, context: `${currentSub}`, action: `jumpToResource('${currentSem.replace(/'/g, "\\'")}', '${currentSub.replace(/'/g, "\\'")}', '${nextPath.replace(/'/g, "\\'")}')` });
            findInDrive(data[key], query, currentSem, currentSub, nextPath, results);
          } else {
             const nextPath = currentPath ? `${currentPath}|${key}` : key;
             findInDrive(data[key], query, currentSem, currentSub, nextPath, results);
          }
        }
      }
      return results;
    }

    const searchInput = document.getElementById('universal-search');
    const resultsDiv = document.getElementById('search-results');

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (Object.keys(driveData).length === 0 || query.length < 2) {
        resultsDiv.innerHTML = '';
        resultsDiv.classList.remove('active');
        return;
      }
      const matched = findInDrive(driveData, query);
      
      if (matched.length > 0) {
        resultsDiv.innerHTML = matched.map(item => {
          const displayContext = item.context ? `<span style="opacity:0.7; font-size:0.8em; display:block; margin-top:3px; color: var(--accent-color);">in ${item.context}</span>` : '';
          if (item.type === 'file') {
              return `<a href="${item.url}" target="_blank" class="result-item">
                        <div><strong>${item.name}</strong>${displayContext}</div>
                        <span class="result-type">${item.type}</span>
                      </a>`;
          } else {
              return `<div class="result-item" onclick="${item.action}">
                        <div><strong>${item.name}</strong>${displayContext}</div>
                        <span class="result-type">${item.type}</span>
                      </div>`;
          }
        }).join('');
        resultsDiv.classList.add('active');
      } else {
        resultsDiv.innerHTML = '<div style="padding:15px; opacity:0.8; font-size:0.9rem; text-align:center; color: var(--accent-color); font-weight: 600;">No direct match found.</div>';
        resultsDiv.classList.add('active');
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) {
          if(resultsDiv) resultsDiv.classList.remove('active');
      }
    });

    const savedTheme = sessionStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);

    document.getElementById('tgl').onclick = () => {
      const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', newTheme);
      sessionStorage.setItem('theme', newTheme);
    };

    document.onmousemove = (e) => {
      document.getElementById('g').style.setProperty('--m-x', e.clientX + 'px');
      document.getElementById('g').style.setProperty('--m-y', e.clientY + 'px');
    };

    fetchData();
  </script>
</body>
</html>
